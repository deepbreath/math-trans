<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Math Academy Translator 设置</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="options">
      <header>
        <h1>Math Academy 双语翻译设置</h1>
      </header>

      <label>
        翻译服务
        <select id="provider">
          <option value="google-web">Google 免费</option>
          <option value="gemini">Gemini API</option>
          <option value="openai">OpenAI API</option>
        </select>
      </label>

      <label>
        源语言
        <input id="sourceLang" type="text" placeholder="auto">
      </label>

      <label>
        目标语言
        <input id="targetLang" type="text" placeholder="zh">
      </label>

      <label>
        每批翻译数量
        <input id="batchSize" type="number" min="1" max="30">
      </label>

      <section data-provider-fields="google-web">
        <label>
          Google 翻译地址
          <input id="googleTranslateUrl" type="url" placeholder="https://translate.google.com">
        </label>
      </section>

      <section data-provider-fields="gemini">
        <label>
          Gemini API Key
          <input id="geminiApiKey" type="password" placeholder="AIza...">
        </label>
        <label>
          Gemini 模型
          <input id="geminiModel" type="text" placeholder="gemini-3.5-flash">
        </label>
      </section>

      <section data-provider-fields="openai">
        <label>
          OpenAI API Key
          <input id="openaiApiKey" type="password" placeholder="sk-...">
        </label>
        <label>
          OpenAI 模型
          <input id="openaiModel" type="text" placeholder="gpt-5.4-mini">
        </label>
      </section>

      <button id="save" type="button">保存</button>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
